<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小吴乐意</title>
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <!-- 只保留一个 tooltip -->
    <div id="copy-tooltip" class="tooltip">点击复制</div>
    
    <main class="container">
        <!-- Profile Section -->
        <div class="profile">
            <div class="profile-header">
                <div class="avatar">
                    <img src="public/avatar.jpg" alt="头像">
                </div>
                <div class="profile-info">
                    <h1>小吴乐意</h1>
                    <div class="profile-details">
                        <p class="title">H.A.B｜哈勃未来 创始人</p>
                        <p>出品电子书《通往比特币之路》</p>
                        <p>100%全仓且唯一只持有比特币</p>
                        <p>曾经抖音短视频年入100万探店博主</p>
                        <p>目前关注：健康，AI，区块链（比特币）</p>
                    </div>
                </div>
                <div class="wechat-qr">
                    <img src="public/xiaowuleyi.jpg" alt="微信二维码">
                    <p>扫码添加微信</p>
                </div>
            </div>
            <p class="bio">"未来的种子，深埋在过去。"</p>
            <div class="btc-address">
                <p id="btc-text">BTC: <span class="btc-value">3KLy733p6vQDyaKdEY61iGdQPf9pYt9hPv</span></p>
                <div id="qrcode-popup" class="qrcode-popup"></div>
            </div>
        </div>

        <!-- 社交媒体链接 -->
        <div class="links-grid">
            <a href="https://blog.xiaowuleyi.com/" target="_blank" class="link-card wordpress">
                <div class="icon">
                    <img src="public/wordpress.svg" alt="WordPress">
                </div>
                <div class="text">
                    <h2>个人博客</h2>
                    <p>同步公众号+部分敏感内容</p>
                </div>
            </a>
            <a href="#" class="link-card wechat">
                <div class="icon">
                    <img src="public/wechat.svg" alt="微信公众号">
                </div>
                <div class="text">
                    <h2>公众号：小吴乐意</h2>
                    <p>比特币，AI，健康，生活闲聊</p>
                </div>
            </a>
            <a href="https://x.com/xiaowuleyi" target="_blank" class="link-card twitter">
                <div class="icon">
                    <img src="public/twitter.svg" alt="Twitter">
                </div>
                <div class="text">
                    <h2>Twitter(X)</h2>
                    <p>自由世界，自由言论</p>
                </div>
            </a>
            <a href="https://v.douyin.com/i5NbBNXT" target="_blank" class="link-card tiktok">
                <div class="icon">
                    <img src="public/tiktok.svg" alt="抖音">
                </div>
                <div class="text">
                    <h2>抖音</h2>
                    <p>记录生活与思考</p>
                </div>
            </a>
            <a href="https://www.youtube.com/@xiaowuleyi" target="_blank" class="link-card youtube">
                <div class="icon">
                    <img src="public/youtube.svg" alt="YouTube">
                </div>
                <div class="text">
                    <h2>YouTube</h2>
                    <p>偶尔放飞自我</p>
                </div>
            </a>
            <a href="https://space.bilibili.com/68332732" target="_blank" class="link-card bilibili">
                <div class="icon">
                    <img src="public/bilibili.svg" alt="哔哩哔哩">
                </div>
                <div class="text">
                    <h2>哔哩哔哩</h2>
                    <p>传说中的"B"站</p>
                </div>
            </a>
        </div>
    </main>

    <div class="copy-success" id="copy-success">复制成功！</div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btcAddress = document.querySelector('.btc-value');
            const tooltip = document.getElementById('copy-tooltip');
            const qrcodePopup = document.getElementById('qrcode-popup');
            const copySuccess = document.getElementById('copy-success');
            
            // 生成二维码
            function generateQR() {
                const qr = qrcode(0, 'L');
                qr.addData('bitcoin:' + btcAddress.textContent);
                qr.make();
                qrcodePopup.innerHTML = qr.createImgTag(5);
            }
            
            // 显示/隐藏二维码
            btcAddress.addEventListener('mouseenter', function(e) {
                if (!qrcodePopup.innerHTML) {
                    generateQR();
                }
                qrcodePopup.style.display = 'block';
                tooltip.style.display = 'block';
                
                // 计算位置
                const rect = btcAddress.getBoundingClientRect();
                const windowWidth = window.innerWidth;
                const qrWidth = 144; // 120px + 24px padding
                
                // 如果右侧空间不足，显示在左侧
                if (rect.right + qrWidth + 10 > windowWidth) {
                    qrcodePopup.style.left = (rect.left - qrWidth - 10) + 'px';
                } else {
                    qrcodePopup.style.left = (rect.right + 10) + 'px';
                }
                
                qrcodePopup.style.top = (rect.top + rect.height/2 - qrWidth/2) + 'px';
            });
            
            btcAddress.addEventListener('mouseleave', function(e) {
                qrcodePopup.style.display = 'none';
                tooltip.style.display = 'none';
            });
            
            // 更新提示位置
            document.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.pageX + 10) + 'px';
                tooltip.style.top = (e.pageY + 10) + 'px';
            });
            
            // 复制功能
            btcAddress.addEventListener('click', async function() {
                try {
                    await navigator.clipboard.writeText(btcAddress.textContent);
                    copySuccess.style.display = 'block';
                    setTimeout(() => {
                        copySuccess.style.display = 'none';
                    }, 2000);
                } catch (err) {
                    console.error('复制失败:', err);
                }
            });
        });
    </script>
</body>
</html>
